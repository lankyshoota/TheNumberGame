<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THE NUMBER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --plus-color: #00ffaa;
      --minus-color: #ff3366;
      --bg: #080808;
      --surface: #111111;
      --text: #f0f0f0;
      --muted: #444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 600px;
      padding: 24px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 10vw, 72px);
      letter-spacing: 8px;
      color: var(--text);
      line-height: 1;
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* Team badge */
    .team-badge {
      padding: 8px 24px;
      border-radius: 2px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 4px;
      border: 1px solid currentColor;
      transition: all 0.3s;
    }

    .team-badge.plus { color: var(--plus-color); border-color: var(--plus-color); box-shadow: 0 0 20px rgba(0,255,170,0.2); }
    .team-badge.minus { color: var(--minus-color); border-color: var(--minus-color); box-shadow: 0 0 20px rgba(255,51,102,0.2); }

    /* The Number */
    .number-container {
      position: relative;
      text-align: center;
    }

    .number-glow {
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.15;
      transition: background 0.5s;
      pointer-events: none;
    }

    .number-glow.positive { background: var(--plus-color); }
    .number-glow.negative { background: var(--minus-color); }
    .number-glow.zero { background: #ffffff; }

    #the-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 20vw, 160px);
      line-height: 1;
      letter-spacing: -2px;
      transition: color 0.3s, transform 0.1s;
      position: relative;
      z-index: 1;
    }

    #the-number.positive { color: var(--plus-color); text-shadow: 0 0 40px rgba(0,255,170,0.4); }
    #the-number.negative { color: var(--minus-color); text-shadow: 0 0 40px rgba(255,51,102,0.4); }
    #the-number.zero { color: var(--text); }

    #the-number.bump {
      animation: bump 0.15s ease-out;
    }

    @keyframes bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 32px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .stat { text-align: center; }
    .stat-value { 
      font-size: 20px; 
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }
    .stat-value.plus-val { color: var(--plus-color); }
    .stat-value.minus-val { color: var(--minus-color); }
    .stat-label { font-size: 10px; letter-spacing: 3px; margin-top: 2px; }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--muted);
      opacity: 0.3;
    }

    /* Click button */
    .click-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid currentColor;
      background: transparent;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .click-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .click-btn.plus { color: var(--plus-color); }
    .click-btn.plus::after { background: radial-gradient(circle, rgba(0,255,170,0.2), transparent); }
    .click-btn.minus { color: var(--minus-color); }
    .click-btn.minus::after { background: radial-gradient(circle, rgba(255,51,102,0.2), transparent); }

    .click-btn:hover::after { opacity: 1; }
    .click-btn:active { transform: scale(0.93); }

    .click-btn:hover {
      box-shadow: 0 0 30px currentColor;
    }

    .btn-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    .btn-symbol { font-size: 48px; line-height: 1; }
    .btn-label { font-size: 11px; letter-spacing: 3px; }

    /* Click particles */
    .particle {
      position: fixed;
      pointer-events: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      font-weight: bold;
      z-index: 999;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }

    /* Timer */
    .timer-bar {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .timer-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .timer-track {
      width: 100%;
      height: 2px;
      background: var(--muted);
      border-radius: 1px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      background: var(--text);
      transition: width 1s linear, background 0.5s;
      border-radius: 1px;
    }

    #timer-text {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 2px;
    }

    /* Last winner */
    .last-winner {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
      text-align: center;
    }

    .last-winner span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 4px;
    }

    .last-winner .w-plus { color: var(--plus-color); }
    .last-winner .w-minus { color: var(--minus-color); }

    /* Live pulse */
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--muted);
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--plus-color);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Winner overlay */
    .winner-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    .winner-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .winner-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 15vw, 120px);
      letter-spacing: 8px;
      animation: glitch 0.3s infinite;
    }

    .winner-sub {
      font-size: 14px;
      letter-spacing: 6px;
      color: var(--muted);
      margin-top: 16px;
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-3px, 1px); }
      94% { transform: translate(3px, -1px); }
      96% { transform: translate(-1px, 2px); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .stats-bar { gap: 16px; }
      .click-btn { width: 130px; height: 130px; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="title">THE NUMBER</div>
    <div class="subtitle">World vs World — Real Time</div>
  </div>

  <div class="live-indicator">
    <div class="pulse-dot"></div>
    <span id="player-count">... ONLINE</span>
  </div>

  <div class="team-badge" id="team-badge">LOADING...</div>

  <div class="number-container">
    <div class="number-glow zero" id="number-glow"></div>
    <div id="the-number" class="zero">0</div>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value plus-val" id="plus-count">0</div>
      <div class="stat-label">+ CLICKS</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="total-clicks">0</div>
      <div class="stat-label">TOTAL</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value minus-val" id="minus-count">0</div>
      <div class="stat-label">− CLICKS</div>
    </div>
  </div>

  <button class="click-btn" id="click-btn">
    <div class="btn-inner">
      <div class="btn-symbol" id="btn-symbol">+</div>
      <div class="btn-label" id="btn-label">PUSH</div>
    </div>
  </button>

  <div class="timer-bar">
    <div class="timer-label">RESETS AT MIDNIGHT</div>
    <div class="timer-track">
      <div class="timer-fill" id="timer-fill" style="width:100%"></div>
    </div>
    <div id="timer-text">--:--:--</div>
  </div>

  <div class="last-winner" id="last-winner" style="display:none">
    YESTERDAY: <span id="winner-text"></span> WON
  </div>

</div>

<!-- Winner overlay -->
<div class="winner-overlay" id="winner-overlay">
  <div class="winner-text" id="winner-overlay-text">+ WINS</div>
  <div class="winner-sub">NEW BATTLE BEGINS IN 3...</div>
</div>

<script>
  const SUPABASE_URL = 'https://jdzocjhmgtdikwncxbuu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impkem9jamhtZ3RkaWt3bmN4YnV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2ODM0MDYsImV4cCI6MjA5NjI1OTQwNn0.6WSXPWNEQtPbuRSV12ETTk4m_SF2mvrbi00Gn6fuAic';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Assign team randomly, persist in localStorage
  let team = localStorage.getItem('tng_team');
  if (!team) {
    team = Math.random() < 0.5 ? 'plus' : 'minus';
    localStorage.setItem('tng_team', team);
  }

  // UI refs
  const numberEl = document.getElementById('the-number');
  const numberGlow = document.getElementById('number-glow');
  const teamBadge = document.getElementById('team-badge');
  const clickBtn = document.getElementById('click-btn');
  const btnSymbol = document.getElementById('btn-symbol');
  const btnLabel = document.getElementById('btn-label');
  const plusCount = document.getElementById('plus-count');
  const minusCount = document.getElementById('minus-count');
  const totalClicks = document.getElementById('total-clicks');
  const timerFill = document.getElementById('timer-fill');
  const timerText = document.getElementById('timer-text');
  const lastWinnerEl = document.getElementById('last-winner');
  const winnerTextEl = document.getElementById('winner-text');
  const playerCountEl = document.getElementById('player-count');
  const winnerOverlay = document.getElementById('winner-overlay');
  const winnerOverlayText = document.getElementById('winner-overlay-text');

  // Set team UI
  function applyTeam() {
    if (team === 'plus') {
      teamBadge.textContent = 'TEAM +1';
      teamBadge.className = 'team-badge plus';
      clickBtn.className = 'click-btn plus';
      btnSymbol.textContent = '+';
      btnLabel.textContent = 'PUSH UP';
    } else {
      teamBadge.textContent = 'TEAM −1';
      teamBadge.className = 'team-badge minus';
      clickBtn.className = 'click-btn minus';
      btnSymbol.textContent = '−';
      btnLabel.textContent = 'PUSH DOWN';
    }
  }
  applyTeam();

  // Update number display
  function updateNumberUI(num) {
    numberEl.textContent = num > 0 ? '+' + num.toLocaleString() : num.toLocaleString();
    numberEl.className = num > 0 ? 'positive' : num < 0 ? 'negative' : 'zero';
    numberGlow.className = 'number-glow ' + (num > 0 ? 'positive' : num < 0 ? 'negative' : 'zero');
  }

  // Bump animation
  function bumpNumber() {
    numberEl.classList.remove('bump');
    void numberEl.offsetWidth;
    numberEl.classList.add('bump');
  }

  // Floating particle on click
  function spawnParticle(e) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = team === 'plus' ? '+1' : '−1';
    p.style.color = team === 'plus' ? 'var(--plus-color)' : 'var(--minus-color)';
    p.style.left = (e.clientX - 15) + 'px';
    p.style.top = (e.clientY - 15) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }

  // Load initial state
  async function loadState() {
    const { data, error } = await sb
      .from('game_state')
      .select('*')
      .eq('id', 1)
      .single();

    if (error) { console.error(error); return; }

    updateNumberUI(data.current_number);
    plusCount.textContent = data.plus_clicks.toLocaleString();
    minusCount.textContent = data.minus_clicks.toLocaleString();
    totalClicks.textContent = (data.plus_clicks + data.minus_clicks).toLocaleString();

    if (data.last_winner) {
      lastWinnerEl.style.display = 'block';
      winnerTextEl.textContent = data.last_winner === 'plus' ? '+1' : '−1';
      winnerTextEl.className = data.last_winner === 'plus' ? 'w-plus' : 'w-minus';
    }
  }
  loadState();

  // Realtime subscription
  sb.channel('game_state_changes')
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'game_state'
    }, (payload) => {
      const d = payload.new;
      updateNumberUI(d.current_number);
      bumpNumber();
      plusCount.textContent = d.plus_clicks.toLocaleString();
      minusCount.textContent = d.minus_clicks.toLocaleString();
      totalClicks.textContent = (d.plus_clicks + d.minus_clicks).toLocaleString();
    })
    .subscribe();

  // Fake online count (realistic-ish)
  let fakeOnline = Math.floor(Math.random() * 40) + 12;
  setInterval(() => {
    fakeOnline += Math.floor(Math.random() * 5) - 2;
    fakeOnline = Math.max(8, Math.min(200, fakeOnline));
    playerCountEl.textContent = fakeOnline + ' ONLINE';
  }, 5000);
  playerCountEl.textContent = fakeOnline + ' ONLINE';

  // Click handler
  let clicking = false;
  clickBtn.addEventListener('click', async (e) => {
    if (clicking) return;
    clicking = true;

    spawnParticle(e);
    bumpNumber();

    const delta = team === 'plus' ? 1 : -1;
    const plusDelta = team === 'plus' ? 1 : 0;
    const minusDelta = team === 'minus' ? 1 : 0;

    // Optimistic update
    const currentNum = parseInt(numberEl.textContent.replace(/[^-0-9]/g, '')) || 0;
    updateNumberUI(currentNum + delta);

    // RPC call to safely increment
    const { error } = await sb.rpc('click_number', {
      delta: delta,
      plus_delta: plusDelta,
      minus_delta: minusDelta
    });

    if (error) {
      console.error(error);
      // revert
      updateNumberUI(currentNum);
    }

    clicking = false;
  });

  // Midnight timer
  function updateTimer() {
    const now = new Date();
    const midnight = new Date();
    midnight.setHours(24, 0, 0, 0);
    const diff = midnight - now;
    const total = 24 * 60 * 60 * 1000;
    const elapsed = total - diff;
    const pct = (elapsed / total) * 100;

    timerFill.style.width = pct + '%';
    timerFill.style.background = pct > 80 ? 'var(--minus-color)' : pct > 50 ? '#ffaa00' : 'var(--text)';

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    timerText.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} LEFT`;

    // Midnight reset check
    if (diff <= 1000) {
      triggerDayReset();
    }
  }

  async function triggerDayReset() {
    const { data } = await sb.from('game_state').select('current_number, plus_clicks, minus_clicks').eq('id', 1).single();
    if (!data) return;

    const winner = data.current_number >= 0 ? 'plus' : 'minus';

    // Save to history
    await sb.from('game_history').insert({
      final_number: data.current_number,
      winner: winner,
      plus_clicks: data.plus_clicks,
      minus_clicks: data.minus_clicks
    });

    // Reset state
    await sb.from('game_state').update({
      current_number: 0,
      plus_clicks: 0,
      minus_clicks: 0,
      day_start: new Date().toISOString(),
      last_winner: winner
    }).eq('id', 1);

    // Show winner overlay
    winnerOverlayText.textContent = winner === 'plus' ? '+ WINS' : '− WINS';
    winnerOverlayText.style.color = winner === 'plus' ? 'var(--plus-color)' : 'var(--minus-color)';
    winnerOverlay.classList.add('show');
    setTimeout(() => winnerOverlay.classList.remove('show'), 4000);
  }

  setInterval(updateTimer, 1000);
  updateTimer();
</script>

</body>
</html>
